#edit aws things before deployment
spring.application.name=Prod-spring-fvu-app

server.port=8081

#Uncomment for aws setup
# FVU JAR path (Linux EC2 path)




#fvu.jar.path=/home/ubuntu/TDS_STANDALONE_FVU_9.2/TDS_STANDALONE_FVU_9.2.jar
